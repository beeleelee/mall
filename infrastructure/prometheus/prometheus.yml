global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vector
    static_configs:
      - targets: ["vector:9598"]

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]

  - job_name: jaeger
    static_configs:
      - targets: ["jaeger:16686"]
