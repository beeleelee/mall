apiVersion: apps/v1
kind: Deployment
metadata:
  name: mall-redis
  namespace: mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mall-redis
  template:
    metadata:
      labels:
        app: mall-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mall-redis
  namespace: mall
spec:
  selector:
    app: mall-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
