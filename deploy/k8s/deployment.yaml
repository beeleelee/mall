apiVersion: apps/v1
kind: Deployment
metadata:
  name: mall
  namespace: mall
  labels:
    app: mall
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mall
  template:
    metadata:
      labels:
        app: mall
    spec:
      containers:
        - name: mall
          image: mall:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: mall-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mall-secrets
                  key: jwt_secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
